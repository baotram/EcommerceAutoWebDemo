name: Selenium Tests CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    name: Run Selenium cross-browser parallel tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify browser installation
        run: |
          google-chrome --version
          firefox --version

      - name: Run SauceDemo Tests in Parallel
        run: |
          cd saucedemo-automation
          mvn clean test -Dheadless=true

      - name: Upload Failure Screenshots
        if: failure() || always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-screenshots
          path: saucedemo-automation/target/screenshots/
          if-no-files-found: ignore
