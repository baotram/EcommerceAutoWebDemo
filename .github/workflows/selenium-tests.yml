name: Selenium Tests CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  schedule:
    # Run test automatically at 00:00 AM Vietnam time (17:00 UTC) every day
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose Environment to run tests'
        required: true
        default: 'sit'
        type: choice
        options:
          - sit
          - stg
      lang:
        description: 'Choose Language pack'
        required: true
        default: 'en'
        type: choice
        options:
          - en
          - vn

jobs:
  test:
    name: Run Selenium cross-browser parallel tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify browser installation
        run: |
          google-chrome --version
          firefox --version

      - name: Run EcommerceAutoWebDemo Tests in Parallel
        run: |
          mvn clean test -Dheadless=true -Denv=${{ github.event.inputs.environment || 'sit' }} -Dlang=${{ github.event.inputs.lang || 'en' }}

      - name: Upload Failure Screenshots
        if: failure() || always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-screenshots
          path: target/screenshots/
          if-no-files-found: ignore
